# H2 file-based database in project folder
spring.datasource.url=jdbc:h2:file:./data/materadios-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.level.root=INFO

# Matera credentials (read from environment variables)
matera.username=${MATERA_USERNAME:}
matera.password=${MATERA_PASSWORD:}

# Google credentials path (JSON service account or OAuth token path)
google.credentials.path=${GOOGLE_CREDENTIALS_PATH:}

# Alternatively provide a short-lived access token (useful for local/dev):
# export GOOGLE_ACCESS_TOKEN="ya29.."

# Application
server.port=8080

spring.jackson.default-property-inclusion=non_empty
spring.jackson.deserialization.accept-empty-array-as-null-object=true
spring.jackson.deserialization.fail-on-null-for-primitives=false
spring.jackson.mapper.accept-case-insensitive-enums=true

spring.output.ansi.enabled=ALWAYS

spring.thymeleaf.cache = false

spring.web.error.include-binding-errors=always
spring.web.error.include-exception=true
spring.web.error.include-message=always
spring.web.error.include-path=always
spring.web.error.include-stacktrace=always
spring.web.error.whitelabel.enabled=false
