<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mailbox Info</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/json.min.js"></script>
<style>
.json-pre { border-radius: 6px; border: 1px solid #ddd; height: auto; margin: 0; overflow: hidden; }
.json-pre code { display:block; max-height: 60vh; overflow:auto; white-space: pre-wrap; }
</style>
</head>
<body class="p-4">
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Mailbox Info</h1>
    <a href="/" class="btn btn-secondary">Back</a>
  </div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div th:if="${info}">
    <div class="json-pre"><pre><code id="info-content" class="language-json"></code></pre></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  const info = /*[[${info}]]*/ {};
  document.getElementById('info-content').textContent = JSON.stringify(info, null, 2);
  hljs.highlightAll();
</script>
</body>
</html>
