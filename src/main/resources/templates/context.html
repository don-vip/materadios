<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Matera - Context</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/json.min.js"></script>

<style>
html, body {
	height: 100%;
}

.json-pre {
  border-radius: 6px;
  border: 1px solid #ddd;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

.json-pre code {
  display: block;
  height: 100%;
  overflow: auto;
  width: 100%;

  white-space: pre-wrap;
  overflow-wrap: anywhere;
  word-break: break-word;
}

table {
	table-layout: fixed;
	width: 100%;
}

td {
	overflow-wrap: anywhere;
	word-break: break-word;
}
</style>

</head>

<body class="p-4">

	<div class="container-fluid px-3 flex-grow-1 d-flex flex-column">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h1>Matera Context</h1>
			<a href="/" class="btn btn-secondary">Back</a>
		</div>

		<div th:if="${contextError}" class="alert alert-danger"
			th:text="${contextError}"></div>

		<div th:if="${context}" class="mt-3">

			<div class="table-responsive">

				<table class="table table-striped w-100 mb-0">
					<thead>
						<tr>
							<th>Building ID</th>
							<th>Person ID</th>
							<th>User ID</th>
							<th>Raw JSON</th>
						</tr>
					</thead>

					<tbody>
						<tr>
							<td th:text="${context.building.id}"></td>
							<td th:text="${context.person.id}"></td>
							<td th:text="${context.user.id}"></td>

							<td>
								<button class="btn btn-sm btn-outline-primary" type="button"
									onclick="toggleJson()">Show</button>
							</td>
						</tr>
					</tbody>
				</table>

			</div>

			<div id="json-panel" style="display: none; height: calc(100vh - 140px); margin-top: 10px;">
  				<pre class="json-pre"><code id="json-content" class="language-json"></code></pre>
			</div>

		</div>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

	<script th:inline="javascript">
		const context = /*[[${context}]]*/{};

		const pretty = JSON.stringify(context, null, 2);

		document.getElementById("json-content").textContent = pretty;

		hljs.highlightAll();
	</script>

	<script>
		function toggleJson() {
			const panel = document.getElementById("json-panel");
			panel.style.display = (panel.style.display === "none") ? "block"
					: "none";
		}
	</script>

</body>
</html>
