<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Building</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/json.min.js"></script>
<style>
.json-pre { border-radius: 6px; border: 1px solid #ddd; height: auto; margin: 0; overflow: hidden; }
.json-pre code { display:block; max-height: 50vh; overflow:auto; white-space: pre-wrap; }
</style>
</head>
<body class="p-4">
<div class="container-fluid px-3">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Building</h1>
    <a href="/" class="btn btn-secondary">Back</a>
  </div>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div th:if="${building}">
    <h3>Summary</h3>
    <table class="table table-striped">
      <tr><th>ID</th><td th:text="${building.id}"></td></tr>
      <tr><th>Name</th><td th:text="${building.name}"></td></tr>
      <tr><th>Address</th><td th:text="${building.full_address}"></td></tr>
    </table>

    <h3>Characteristics</h3>
    <div class="json-pre"><pre><code id="charac-content" class="language-json"></code></pre></div>

    <h3>Config</h3>
    <div class="json-pre"><pre><code id="config-content" class="language-json"></code></pre></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  const charac = /*[[${charac}]]*/ {};
  const config = /*[[${config}]]*/ {};
  document.getElementById('charac-content').textContent = JSON.stringify(charac, null, 2);
  document.getElementById('config-content').textContent = JSON.stringify(config, null, 2);
  hljs.highlightAll();
</script>
</body>
</html>
