<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matera Exporter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h1>Matera Exporter</h1>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="post" action="/export/all" style="display:inline">
        <button type="submit" class="btn btn-primary mb-3">Export all from Matera (TODO)</button>
    </form>
    <a class="btn btn-outline-secondary mb-3 ms-2" href="/matera/context">View Matera Context</a>

    <div class="mb-3">
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/building">Building</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/exercices">Exercices</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/letters">Letters</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/electronic_letters">Electronic Letters</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/mailbox/info">Mailbox Info</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/mailbox/threads">Mailbox Threads</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/meters">Meters</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/mutations">Mutations</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/owners">Owners</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/private_topics">Private Topics</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/projects">Projects</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/suppliers">Suppliers</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/tenants">Tenants</a>
      <a class="btn btn-sm btn-outline-primary me-1" href="/matera/topics">Topics</a>
    </div>

    <h2>Exported items</h2>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Matera ID</th>
            <th>Local file</th>
            <th>Exported</th>
            <th>Google link</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${items}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.type}"></td>
            <td th:text="${item.materaId}"></td>
            <td>
                <a th:href="${(#strings.replace(item.localPath, '\\\\', '/')).startsWith('/') ? 'file://' + #strings.replace(item.localPath, '\\\\', '/') : 'file:///' + #strings.replace(item.localPath, '\\\\', '/')}" th:text="${item.localPath}" target="_blank"></a>
            </td>
            <td th:text="${item.exported}"></td>
            <td>
                <a th:if="${item.googleUrl}" th:href="${item.googleUrl}" th:text="${item.googleUrl}" target="_blank"></a>
            </td>
            <td>
                <form th:action="@{/export/item/{id}(id=${item.id})}" method="post" style="display:inline-block">
                    <button class="btn btn-sm btn-outline-primary" type="submit">Export to Google (TODO)</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <h3>Batch export by time range</h3>
    <form method="post" action="/export/batch" class="row g-3">
        <div class="col-md-4">
            <label class="form-label">Start (local date-time)</label>
            <input name="start" type="datetime-local" class="form-control" required />
        </div>
        <div class="col-md-4">
            <label class="form-label">End (local date-time)</label>
            <input name="end" type="datetime-local" class="form-control" required />
        </div>
        <div class="col-md-4 align-self-end">
            <button class="btn btn-secondary" type="submit">Export range (TODO)</button>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
