<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Letters</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/json.min.js"></script>
</head>
<body class="p-4">
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Letters</h1>
    <a href="/" class="btn btn-secondary">Back</a>
  </div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div th:if="${letters}">
    <table class="table table-striped">
      <thead><tr><th>ID</th><th>Created</th><th>Status</th></tr></thead>
      <tbody>
        <tr th:each="l : ${letters}">
          <td th:text="${l.id}"></td>
          <td th:text="${l.created_at}"></td>
          <td th:text="${l.status}"></td>
        </tr>
      </tbody>
    </table>

    <div class="d-flex justify-content-between">
      <div>
        <span th:if="${meta}">Total: <span th:text="${meta.total_count}"></span></span>
      </div>
      <div>
        <a th:if="${meta != null and meta.has_next_page}" th:href="@{/matera/letters(after=${meta.end_cursor})}" class="btn btn-sm btn-outline-primary">Next</a>
      </div>
    </div>
  </div>
</div>
<script>hljs.highlightAll();</script>
</body>
</html>
