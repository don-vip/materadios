<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Documents</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .folder-row { cursor: pointer; }
    .folder-row:hover td:not(.actions) { background-color: #f0f4ff; }
    .doc-row:hover td { background-color: #f8f9fa; }
    .file-size { white-space: nowrap; }
</style>
</head>
<body class="p-4">
<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Documents</h1>
        <a href="/" class="btn btn-secondary btn-sm">Back</a>
    </div>

    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/matera/documents">Root</a></li>
            <li th:if="${folderName}" class="breadcrumb-item active" th:text="${folderName}"></li>
        </ol>
    </nav>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Subfolders -->
    <div th:if="${subFolders != null and !#lists.isEmpty(subFolders)}" class="mb-4">
        <h5 class="text-muted mb-2">
            &#128193; Folders (<span th:text="${#lists.size(subFolders)}"></span>)
        </h5>
        <table class="table table-sm table-hover mb-0 border rounded">
            <tbody>
                <tr th:each="f : ${subFolders}" class="folder-row"
                    th:attr="data-href=@{/matera/documents(folderId=${f.id},folderName=${f.name})}">
                    <td style="width:2em">&#128193;</td>
                    <td th:text="${f.name}" class="fw-semibold"></td>
                    <td><span class="badge bg-secondary" th:text="${f.kind}"></span></td>
                    <td class="text-muted small">
                        <span th:text="${f.documents_count}"></span> doc(s)
                    </td>
                    <td class="actions" onclick="event.stopPropagation()">
                        <form th:action="@{/export/document/folder/{id}(id=${f.id})}" method="post">
                            <input type="hidden" name="folderId" th:value="${folderId}" />
                            <input type="hidden" name="folderName" th:value="${folderName}" />
                            <button type="submit" class="btn btn-sm btn-outline-warning">
                                Export all
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Documents -->
    <div th:if="${documents != null}">
        <h5 class="text-muted mb-2">
            &#128196; Files
            <span th:if="${meta}" class="small fw-normal">
                (<span th:text="${meta.total_count}"></span> total)
            </span>
        </h5>

        <div th:if="${#lists.isEmpty(documents)}" class="text-muted fst-italic">No documents in this folder.</div>

        <table th:unless="${#lists.isEmpty(documents)}" class="table table-sm table-hover border rounded">
            <thead class="table-light">
                <tr>
                    <th style="width:2em"></th>
                    <th>Name</th>
                    <th>Kind</th>
                    <th>Type</th>
                    <th>Size</th>
                    <th>Date</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="d : ${documents}" class="doc-row">
                    <td>&#128196;</td>
                    <td th:text="${d.name}"></td>
                    <td><span class="badge bg-secondary" th:text="${d.kind}"></span></td>
                    <td class="small text-muted" th:text="${d.file != null ? d.file.content_type : ''}"></td>
                    <td class="small text-muted file-size"
                        th:text="${d.file != null and d.file.size != null
                            ? #numbers.formatDecimal(d.file.size / 1024.0, 1, 'COMMA', 1, 'POINT') + ' KB'
                            : ''}">
                    </td>
                    <td class="small text-muted" th:text="${#temporals.format(d.created_at, 'yyyy-MM-dd')}"></td>
                    <td class="text-nowrap">
                        <a th:if="${d.file != null and d.file.url != null}"
                           th:href="${d.file.url}"
                           target="_blank"
                           class="btn btn-sm btn-outline-primary me-1">Open</a>

                        <span th:if="${exportedDocumentIds != null and exportedDocumentIds.contains(d.id)}"
                              class="badge bg-success">Exported</span>

                        <form th:unless="${exportedDocumentIds != null and exportedDocumentIds.contains(d.id)}"
                              th:action="@{/export/document/{id}(id=${d.id})}"
                              method="post" style="display:inline">
                            <input type="hidden" name="folderId" th:value="${folderId}" />
                            <input type="hidden" name="folderName" th:value="${folderName}" />
                            <button type="submit" class="btn btn-sm btn-outline-success">Export</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${meta}" class="d-flex justify-content-between align-items-center mt-2">
            <span class="text-muted small">
                Showing <span th:text="${#lists.size(documents)}"></span>
                of <span th:text="${meta.total_count}"></span>
            </span>
            <a th:if="${meta.has_next_page}"
               th:href="@{/matera/documents(folderId=${folderId},folderName=${folderName},after=${meta.end_cursor})}"
               class="btn btn-sm btn-outline-secondary">Next &rarr;</a>
        </div>
    </div>

</div>
<script>
    document.querySelectorAll('.folder-row[data-href]').forEach(function(row) {
        row.addEventListener('click', function() {
            window.location = row.dataset.href;
        });
    });
</script>
</body>
</html>
