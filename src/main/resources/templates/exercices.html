<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Exercices</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/json.min.js"></script>
</head>
<body class="p-4">
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Exercices</h1>
    <a href="/" class="btn btn-secondary">Back</a>
  </div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div th:if="${exercices}">
    <table class="table table-striped">
      <thead><tr><th>ID</th><th>Year</th><th>Status</th></tr></thead>
      <tbody>
        <tr th:each="e : ${exercices}">
          <td th:text="${e.id}"></td>
          <td th:text="${e.year}"></td>
          <td th:text="${e.status}"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script>hljs.highlightAll();</script>
</body>
</html>
