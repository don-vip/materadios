<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Error</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  .trace-pre { max-height: 60vh; overflow: auto; background:#f8f9fa; padding: 1rem; border-radius:4px; border:1px solid #e2e6ea; }
</style>
</head>
<body class="p-4">
<div class="container">
  <h1 class="text-danger">Application Error</h1>

  <div class="alert alert-warning" th:if="${message != null and message != ''}" th:text="${message}"></div>

  <div class="mb-3">
    <table class="table table-sm">
      <tr><th>Timestamp</th><td th:text="${timestamp}"></td></tr>
      <tr><th>Status</th><td th:text="${status}"></td></tr>
      <tr><th>Error</th><td th:text="${error}"></td></tr>
      <tr><th>Exception</th><td th:text="${exception}"></td></tr>
      <tr><th>Path</th><td th:text="${path}"></td></tr>
    </table>
  </div>

  <div th:if="${trace}">
    <h5>Stacktrace</h5>
    <div class="mb-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="toggleTrace()">Toggle stacktrace</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="copyTrace()">Copy</button>
    </div>
    <div id="trace-block" style="display:block">
      <pre class="trace-pre" id="trace-content" th:text="${trace}"></pre>
    </div>
  </div>

  <p class="mt-3">If you see this page, the application encountered an error. Check logs for details.</p>
  <a href="/" class="btn btn-primary">Back to home</a>
</div>

<script>
  function toggleTrace(){
    const el = document.getElementById('trace-block');
    el.style.display = (el.style.display === 'none') ? 'block' : 'none';
  }
  function copyTrace(){
    const t = document.getElementById('trace-content').innerText;
    navigator.clipboard?.writeText(t).then(()=>alert('Copied stacktrace to clipboard'), ()=>alert('Copy failed'));
  }
</script>
</body>
</html>
