<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matera - Buildings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Matera Buildings</h1>
      <a href="/" class="btn btn-secondary">Back</a>
    </div>

    <div th:if="${buildingsError}" class="alert alert-danger" th:text="${buildingsError}"></div>

    <div th:if="${#lists.isEmpty(buildings)}">
      <p>No buildings found (response empty).</p>
    </div>

    <div th:if="${!#lists.isEmpty(buildings)}">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Address</th>
            <th>Raw JSON</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="b : ${buildings}">
            <td th:text="${b.id != null ? b.id : b['id']}"></td>
            <td th:text="${b.name != null ? b.name : b['name']}"></td>
            <td th:text="${b.address != null ? b.address : b['address']}"></td>
            <td><button class="btn btn-sm btn-outline-primary" type="button" data-bs-toggle="collapse" th:attr="data-bs-target=${'#json-'+__${b.id} }">Show</button></td>
          </tr>
          <tr th:each="b : ${buildings}">
            <td colspan="4">
              <pre style="max-height:300px;overflow:auto">[[${#objects.toJsonString(b)}]]</pre>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
